<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Air Quality Index Predictor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    padding:35px;
    border-radius:18px;
    width:430px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    color:#203a43;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:9px;
    margin:7px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:11px;
    background:#203a43;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    margin-top:12px;
    transition:0.3s;
}

button:hover{
    background:#2c5364;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    border-radius:25px;
    color:white;
    margin-top:10px;
    font-size:16px;
}

/* AQI Colors */

.good{
background:#2ecc71;
}

.moderate{
background:#f1c40f;
color:black;
}

.sensitive{
background:#e67e22;
}

.unhealthy{
background:#e74c3c;
}

.very_unhealthy{
background:#8e44ad;
}

.hazardous{
background:#2c3e50;
}

</style>
</head>

<body>

<div class="card">

<h2>AQI Predictor</h2>

<form id="aqiForm">

<input type="text" name="Country" placeholder="Country" required>

<input type="number" name="AQI_Value" placeholder="AQI Value" required>

<input type="number" name="CO_AQI_Value" placeholder="CO AQI Value" required>

<select name="CO_AQI_Category">
<option>Good</option>
<option>Moderate</option>
<option>Unhealthy for Sensitive Groups</option>
</select>

<input type="number" name="Ozone_AQI_Value" placeholder="Ozone AQI Value" required>

<select name="Ozone_AQI_Category">
<option>Good</option>
<option>Moderate</option>
<option>Unhealthy for Sensitive Groups</option>
<option>Unhealthy</option>
<option>Very Unhealthy</option>
</select>

<input type="number" name="NO2_AQI_Value" placeholder="NO2 AQI Value" required>

<select name="NO2_AQI_Category">
<option>Good</option>
<option>Moderate</option>
</select>

<input type="number" name="PM25_AQI_Value" placeholder="PM2.5 AQI Value" required>

<select name="PM25_AQI_Category">
<option>Good</option>
<option>Moderate</option>
<option>Unhealthy for Sensitive Groups</option>
<option>Unhealthy</option>
<option>Very Unhealthy</option>
<option>Hazardous</option>
</select>

<button type="submit">Predict</button>

</form>

<div id="result"></div>

</div>

<script>

function getClass(category){

if(category==="Good") return "good"

if(category==="Moderate") return "moderate"

if(category==="Unhealthy for Sensitive Groups") return "sensitive"

if(category==="Unhealthy") return "unhealthy"

if(category==="Very Unhealthy") return "very_unhealthy"

if(category==="Hazardous") return "hazardous"

}


document.getElementById("aqiForm").addEventListener("submit",async function(e){

e.preventDefault()

const formData = Object.fromEntries(new FormData(this).entries())

const response = await fetch("/predict",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(formData)
})

const data = await response.json()

if(data.prediction){

const pred = data.prediction[0]

const cls = getClass(pred)

document.getElementById("result").innerHTML =
`Predicted AQI Category:<br>
<span class="badge ${cls}">${pred}</span>`

}else{

document.getElementById("result").innerText =
"Error: " + data.error

}

})

</script>

</body>
</html>
