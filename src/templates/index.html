<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AQI Predictor</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f4c81,#3fa9f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
text-align:center;
color:#0f4c81;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#0f4c81;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#08345c;
}

#result{
margin-top:15px;
font-size:18px;
text-align:center;
color:#0f4c81;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>AQI Predictor</h2>

<form id="form">

<input name="Country" placeholder="Country" required>

<input type="number" name="CO_AQI_Value" placeholder="CO AQI Value" required>

<input type="number" name="Ozone_AQI_Value" placeholder="Ozone AQI Value" required>

<input type="number" name="NO2_AQI_Value" placeholder="NO2 AQI Value" required>

<input type="number" name="PM25_AQI_Value" placeholder="PM2.5 AQI Value" required>

<button type="submit">Predict</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("form").addEventListener("submit", async function(e){

e.preventDefault()

const formData = Object.fromEntries(new FormData(this).entries())

const response = await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(formData)
})

const data = await response.json()

if(data.prediction){

document.getElementById("result").innerText =
"Predicted AQI Category: " + data.prediction[0]

}else{

document.getElementById("result").innerText =
"Error: " + data.error

}

})

</script>

</body>
</html>
